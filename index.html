<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lúmina nocturna</title>
    
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
</head>
<body>

    <header>
        <h1>LÚMINA NOCTURNA</h1>
        <nav>
            <button id="btn-open-register">Registrarse</button>
            <button id="btn-open-login">Iniciar Sesión</button>
            <button id="btn-logout" style="display: none;">Cerrar Sesión</button>
            <button id="btn-theme" title="Alternar modo oscuro">🌙</button>
        </nav>
    </header>

    <main>
        <section id="productos-seccion">
            <h2>Catálogo de Productos</h2>     
            <div class="search-container">
                <input type="text" id="input-busqueda" placeholder="BUSCAR POR NOMBRE O CATEGORÍA...">
            </div>  
            <div class="filtros-container" style="margin-bottom: 2rem; display: flex; gap: 0.5rem; flex-wrap: wrap;">
                <button id="btn-todos" class="btn-principal">Todos</button>
                <button id="btn-arriba" class="btn-secundario">Partes de arriba</button>
                <button id="btn-abajo" class="btn-secundario">Partes de abajo</button>
                <button id="btn-vestidos" class="btn-secundario">Vestidos</button>
            </div>

            <div id="contenedor-productos" class="grid-productos">
                </div>
        </section>

        <section id="carrito-seccion">
            <h2>Carrito</h2>
            <ul id="carrito-items">
                <p>El carrito está vacío.</p>
            </ul>
            <div class="carrito-footer">
                <p>Total: <span id="total">$0</span></p>
                <button id="btn-comprar" class="btn-principal">Finalizar Compra</button>
                <button id="btn-vaciar" class="btn-secundario">Vaciar Carrito</button>
            </div>
        </section>
    </main>

    <div id="auth-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span id="close-modal" class="close">&times;</span>
            <h2 id="auth-titulo">Iniciar Sesión</h2>
            <form id="auth-form">
                <div class="input-group">
                    <label for="auth-email">Correo Electrónico</label>
                    <input type="email" id="auth-email" required placeholder="tu@email.com" />
                </div>
                
                <div class="input-group" style="position: relative;">
                    <label for="auth-pass">Contraseña</label>
                    <input type="password" id="auth-pass" required placeholder="••••••••" />
                    <button type="button" id="btn-toggle-pass" class="btn-eye" style="position: absolute; right: 10px; bottom: 8px; border: none; background: none; cursor: pointer;">
                        👁️
                    </button>
                </div>
                
                <button type="submit" id="auth-submit" class="btn-principal" style="width: 100%; margin-top: 1rem;">Confirmar</button>
            </form>
        </div>
    </div>

    <footer>
        <p>Lúmina Nocturna</p>
    </footer>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script type="module" src="js/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
